<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lista de Citas</title>
</head>
<body>

<h1>Lista de Citas Médicas</h1>

<a href="/nueva-cita">Registrar nueva cita</a>
<br>
<a href="/agenda">Ver agenda del día</a>
<br>
<a href="/agenda-semanal">Ver agenda semanal</a>

<br><br>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Paciente</th>
    <th>Doctor</th>
    <th>Fecha</th>
    <th>Estado</th>
    <th>Acciones</th>
  </tr>
  </thead>

  <tbody>
  <tr th:each="cita : ${citas}">
    <td th:text="${cita.id}"></td>
    <td th:text="${cita.nombrePaciente}"></td>
    <td th:text="${cita.doctor}"></td>
    <td th:text="${cita.fecha}"></td>
    <td th:text="${cita.estado}"></td>
    <td>
      <a th:if="${cita.estado == 'Programada'}"
         th:href="@{/cambiar-estado/{id}(id=${cita.id})}">
        Atender
      </a>

      <span th:if="${cita.estado == 'Programada'}"> | </span>

      <a th:if="${cita.estado == 'Programada'}"
         th:href="@{/cancelar-cita/{id}(id=${cita.id})}">
        Cancelar
      </a>
    </td>
  </tr>
  </tbody>
</table>

</body>
</html>
