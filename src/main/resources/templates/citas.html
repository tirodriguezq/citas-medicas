<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lista de Citas</title>
</head>
<body>

<h1>Lista de Citas Médicas</h1>

<p>
  Usuario: <span th:text="${usuario}"></span>
</p>

<p>
  Roles: <span th:text="${roles}"></span>
</p>

<a href="/nueva-cita">Registrar nueva cita</a>
<br>
<a href="/agenda">Ver agenda del día</a>
<br>
<a href="/agenda-semanal">Ver agenda semanal</a>
<br>
<a href="/logout">Cerrar sesión</a>

<br><br>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Paciente</th>
    <th>Doctor</th>
    <th>Fecha</th>
    <th>Estado</th>
    <th>Acciones</th>
  </tr>
  </thead>

  <tbody>
  <tr th:each="cita : ${citas}">
    <td th:text="${cita.id}"></td>
    <td th:text="${cita.pacienteId}"></td>
    <td th:text="${cita.doctorId}"></td>
    <td th:text="${cita.fecha}"></td>
    <td th:text="${cita.estado}"></td>

    <td>
      <span th:if="${esAdmin}">
        <span th:if="${cita.estado == 'PROGRAMADA'}">
          <a th:href="@{/cambiar-estado/{id}(id=${cita.id})}">Atender</a>
          |
          <a th:href="@{/cancelar-cita/{id}(id=${cita.id})}">Cancelar</a>
        </span>
        <span th:if="${cita.estado != 'PROGRAMADA'}">Sin acciones</span>
      </span>

      <span th:unless="${esAdmin}">
        Sin permisos
      </span>
    </td>
  </tr>
  </tbody>
</table>

</body>
</html>
