<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Cita</title>
</head>
<body>
<h1>Registrar Nueva Cita</h1>

<form action="/guardar-cita" method="post">
    <label>Nombre del paciente:</label><br>
    <input type="text" name="nombrePaciente" required><br><br>

    <label>Doctor:</label><br>
    <input type="text" name="doctor" required><br><br>

    <label>Fecha:</label><br>
    <input type="date" name="fecha" required><br><br>

    <label>Estado:</label><br>
    <select name="estado">
        <option value="Programada">Programada</option>
        <option value="Atendida">Atendida</option>
        <option value="Cancelada">Cancelada</option>
    </select><br><br>

    <button type="submit">Guardar Cita</button>
</form>

<br>
<a href="/citas">Volver a la lista de citas</a>
</body>
</html>
