<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Cita</title>
</head>
<body>

<h1>Registrar Nueva Cita</h1>

<p th:if="${error}" th:text="${error}" style="color:red;"></p>

<form action="/guardar-cita" method="post" th:object="${cita}">
    <label>Nombre del paciente:</label><br>
    <input type="text" th:field="*{nombrePaciente}"><br><br>

    <label>Doctor:</label><br>
    <select th:field="*{doctor}">
        <option value="">Seleccione un doctor</option>
        <option th:each="doctor : ${doctores}"
                th:value="${doctor.nombre}"
                th:text="${doctor.nombre + ' - ' + doctor.especialidad}">
        </option>
    </select><br><br>

    <label>Fecha:</label><br>
    <input type="date" th:field="*{fecha}"><br><br>

    <button type="submit">Guardar Cita</button>
</form>

<br>
<a href="/citas">Volver a la lista de citas</a>

</body>
</html>
