<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Cita</title>
</head>
<body>
<h1>Registrar Nueva Cita</h1>

<p th:if="${error}" th:text="${error}" style="color:red;"></p>

<form action="/guardar-cita" method="post">
    <label>Nombre del paciente:</label><br>
    <input type="text" name="nombrePaciente"><br><br>

    <label>Doctor:</label><br>
    <select name="doctor">
        <option value="">Seleccione un doctor</option>
        <option th:each="doctor : ${doctores}"
                th:value="${doctor.nombre}"
                th:text="${doctor.nombre + ' - ' + doctor.especialidad}">
        </option>
    </select><br><br>

    <label>Fecha:</label><br>
    <input type="date" name="fecha"><br><br>

    <label>Estado:</label><br>
    <select name="estado">
        <option value="">Seleccione un estado</option>
        <option value="Programada">Programada</option>
        <option value="Atendida">Atendida</option>
        <option value="Cancelada">Cancelada</option>
    </select><br><br>

    <button type="submit">Guardar Cita</button>
</form>

<br>
<a href="/citas">Volver a la lista de citas</a>
</body>
</html>
