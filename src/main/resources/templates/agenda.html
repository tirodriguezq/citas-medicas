<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Agenda del Día</title>
</head>
<body>

<h1>Agenda Diaria de Citas</h1>

<form action="/agenda" method="get">
  <label>Seleccione la fecha:</label>
  <input type="date" name="fecha" th:value="${fechaSeleccionada}">
  <button type="submit">Buscar</button>
</form>

<br>
<a href="/citas">Volver a la lista de citas</a>

<br><br>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Paciente</th>
    <th>Doctor</th>
    <th>Fecha</th>
    <th>Estado</th>
  </tr>
  </thead>

  <tbody>
  <tr th:each="cita : ${citas}">
    <td th:text="${cita.id}"></td>
    <td th:text="${cita.nombrePaciente}"></td>
    <td th:text="${cita.doctor}"></td>
    <td th:text="${cita.fecha}"></td>
    <td th:text="${cita.estado}"></td>
  </tr>
  </tbody>
</table>

</body>
</html>
